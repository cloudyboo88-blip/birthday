<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
            padding: 20px;
        }

        /* Container Kartu */
        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            backdrop-filter: blur(5px);
            border: 2px solid #ffb3c6;
            z-index: 10;
            transition: all 0.5s ease;
        }

        /* Halaman (Sembunyikan semua di awal kecuali hal 1) */
        .page {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .page.active {
            display: block;
        }

        /* Tipografi */
        h1 {
            color: #ff477e;
            font-size: 2rem;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        p {
            color: #4a4a4a;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            white-space: pre-line; /* Menjaga enter/baris baru */
        }

        .highlight {
            font-weight: bold;
            color: #ff5c8a;
        }

        /* Tombol */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            position: relative;
            min-height: 50px;
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-next, .btn-yes {
            background-color: #ff477e;
            color: white;
        }

        .btn-next:hover, .btn-yes:hover {
            background-color: #ff7096;
            transform: scale(1.05);
        }

        .btn-no {
            background-color: #f0f0f0;
            color: #6c757d;
            position: relative;
            transition: all 0.2s ease;
        }

        /* Efek Hati */
        .heart {
            position: absolute;
            color: #ff7096;
            font-size: 20px;
            position: fixed;
            top: -10%;
            user-select: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) translateX(100px) rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

            </div>
