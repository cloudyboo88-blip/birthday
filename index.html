<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
            padding: 20px;
            position: relative;
        }

        /* Container Kartu (Kotak putih dihapus, sekarang transparan) */
        .card {
            background: transparent;
            padding: 20px;
            max-width: 600px;
            width: 100%;
            z-index: 10; /* Berada di atas efek hati agar bisa diklik */
            transition: all 0.5s ease;
        }

        /* Halaman */
        .page {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .page.active {
            display: block;
        }

        /* Tipografi */
        h1 {
            color: #ff477e;
            font-size: 2.2rem;
            margin-bottom: 30px;
            line-height: 1.4;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.6);
        }

        p {
            color: #4a4a4a;
            font-size: 1.2rem;
            line-height: 1.7;
            margin-bottom: 30px;
            white-space: pre-line;
            font-weight: 500;
        }

        .highlight {
            font-weight: bold;
            color: #ff5c8a;
            font-size: 1.4rem;
        }

        /* Tombol */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            position: relative;
            min-height: 60px;
        }

        button {
            padding: 14px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            box-shadow: 0 4px 15px rgba(219, 68, 118, 0.2);
            z-index: 15; /* Memastikan tombol paling depan untuk diklik */
        }

        .btn-yes, .btn-next {
            background-color: #ff477e;
            color: white;
        }

        .btn-yes:hover, .btn-next:hover {
            background-color: #ff7096;
            transform: scale(1.05);
        }

        .btn-no {
            background-color: #ffffff;
            color: #ff477e;
            border: 2px solid #ff477e;
            position: relative;
            transition: all 0.2s ease;
        }
